<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Regularização Ambiental Descomplicada</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container-sfb">
      <img
        class="banner-sfb"
        src="./assets/regularizacao.png"
        alt="Regularização Ambiental Descomplicada"
      />

      <section class="section-conteudo">
        <div class="container-botoes-sfb">
          <div class="wrapper-btn-sfb">
            <div class="dobra-btn-sfb"></div>
            <a
              class="btn-sfb"
              href=""
            >
              <span class="material-icons btn-icon">person</span>
              <span>Ambientação</span>
            </a>
          </div>
          <div class="wrapper-btn-sfb">
            <div class="dobra-btn-sfb"></div>
            <a
              class="btn-sfb"
              href=""
            >
              <span class="material-icons btn-icon">menu_book</span>
              <span>E-book</span>
            </a>
          </div>
          <div class="wrapper-btn-sfb">
            <div class="dobra-btn-sfb"></div>
            <a
              class="btn-sfb"
              href=""
            >
              <span class="material-icons btn-icon">assignment_turned_in</span>
              <span>Avaliação</span>
            </a>
          </div>
          <div class="wrapper-btn-sfb">
            <div class="dobra-btn-sfb"></div>
            <a
              class="btn-sfb"
              href=""
            >
              <span class="material-icons btn-icon">sentiment_satisfied</span>
              <span>Avaliação de Reação</span>
            </a>
          </div>
          <div class="wrapper-btn-sfb">
            <div class="dobra-btn-sfb"></div>
            <a
              class="btn-sfb"
              href=""
            >
              <span class="material-icons btn-icon">verified</span>
              <span>Certificado</span>
            </a>
          </div>
        </div>
      </section>

      <section class="section-jornada">
        <div class="container-modulos-sfb">
          <div class="trilha-modulos" aria-hidden="true"></div>

          <div class="card-modulo-sfb">
            <div class="card-icon-pin card-icon-pin-1" data-step="1">
              <span class="material-icons card-icon">person</span>
            </div>
            <div class="card-label card-label-1">Fase Inicial</div>
            <p class="card-description">
              
            </p>
          </div>

          <div class="card-modulo-sfb">
            <div class="card-icon-pin card-icon-pin-2" data-step="2">
              <span class="material-icons card-icon">menu_book</span>
            </div>
            <div class="card-label card-label-2">Fase Intermediária</div>
            <p class="card-description">
              
            </p>
          </div>

          <div class="card-modulo-sfb">
            <div class="card-icon-pin card-icon-pin-3" data-step="3">
              <span class="material-icons card-icon">star</span>
            </div>
            <div class="card-label card-label-3">Fase Avançada</div>
            <p class="card-description">
              
            </p>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
